name = "dml-bps-mcp"
main = "src/worker.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[vars]
# BPS_API_BASE_URL is configured to route through the proxy and bypass BPS WAF blocks on Cloudflare Workers
BPS_API_BASE_URL = "https://bps-api.digimetalab.my.id/v1"
BPS_ALLSTATS_BASE_URL = "https://bps-api.digimetalab.my.id/allstats/"
BPS_DEFAULT_LANG = "ind"
BPS_DEFAULT_DOMAIN = "0000"

# KV namespace for BPS data caching
[[kv_namespaces]]
binding = "BPS_CACHE"
id = "acc8c251181f4589af9a104b4ef1b37c"

# KV namespace for OAuth tokens (required by workers-oauth-provider)
# Create with: wrangler kv namespace create OAUTH_KV
[[kv_namespaces]]
binding = "OAUTH_KV"
id = "0d1f335bfbb349ee8f23d1fdcaf01b00"
